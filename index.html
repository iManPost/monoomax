  <script>
/* ==========================
   ข้อมูลต้นฉบับ
========================== */

const PORTAL_URL = "https://imanpost.github.io/monoomax/";
const MAC_ADDRESS = "00:11:22:33:44:55";

/* ==========================
   Base64
========================== */

const URL_BASE64 = "YUhSMGNEb3ZMMmx0WVc1d2IzTjBMbWRwZEdoMVlpNXBieTlwY0hSMmJtVjMv";
const MAC_BASE64 = "MDA6MTE6MjI6MzM6NDQ6NTU=";

/* ==========================
   ถอดรหัส
========================== */

const CONFIG = {
    p: atob(URL_BASE64),
    m: atob(MAC_BASE64)
};

/* ==========================
   ปิดคลิกขวา
========================== */

document.addEventListener("contextmenu", function(e){
    e.preventDefault();
    return false;
});

/* ==========================
   ปิด F12 / DevTools Shortcut
========================== */

document.addEventListener("keydown", function(e){

    if (
        e.key === "F12" ||
        (e.ctrlKey && e.shiftKey &&
            ["I","J","C"].includes(e.key.toUpperCase())
        ) ||
        (e.ctrlKey && e.key.toUpperCase() === "U")
    ){
        e.preventDefault();
        return false;
    }

});

/* ==========================
   ปิดลากรูป
========================== */

document.addEventListener("dragstart", function(e){
    e.preventDefault();
});

/* ==========================
   ปิดเลือกข้อความ
========================== */

document.addEventListener("selectstart", function(e){
    e.preventDefault();
});

/* ==========================
   ตรวจ DevTools
========================== */

setInterval(function(){

    const widthThreshold =
        window.outerWidth - window.innerWidth > 160;

    const heightThreshold =
        window.outerHeight - window.innerHeight > 160;

    if(widthThreshold || heightThreshold){

        document.body.innerHTML = `
        <div style="
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-size:24px;
            font-family:sans-serif;">
            Access Denied
        </div>`;
    }

},1000);
</script>
<style>
:root{
  --bg:#0b0c10;
  --panel:#15171c;
  --panel2:#1d2027;
  --accent:#ff3b30;
  --accent2:#ffb020;
  --text:#f2f2f2;
  --muted:#8c92a0;
  --focus:#ffffff;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  background:var(--bg);
  color:var(--text);
  font-family:'Segoe UI',Tahoma,Arial,sans-serif;
  height:100%;
  overflow-x:hidden;
}
body{display:flex;flex-direction:column;min-height:100vh;}

/* ===== HEADER / SLIDER ===== */
.hero{
  position:relative;
  width:100%;
  height:42vh;
  min-height:220px;
  max-height:480px;
  overflow:hidden;
  background:#000;
}
.hero-track{
  display:flex;
  height:100%;
  transition:transform .5s ease;
  will-change:transform;
}
.hero-slide{
  position:relative;
  flex:0 0 100%;
  height:100%;
  background-size:cover;
  background-position:center top;
  cursor:pointer;
}
.hero-slide::after{
  content:"";
  position:absolute;inset:0;
  background:linear-gradient(to top, rgba(11,12,16,1) 0%, rgba(11,12,16,0.55) 35%, rgba(11,12,16,0) 70%),
             linear-gradient(to right, rgba(11,12,16,0.6) 0%, rgba(11,12,16,0) 40%);
}
.hero-info{
  position:absolute;
  left:24px; right:24px; bottom:18px;
  z-index:2;
}
.hero-tag{
  display:inline-block;
  background:var(--accent);
  color:#fff;
  font-size:11px;
  font-weight:700;
  letter-spacing:.05em;
  padding:3px 10px;
  border-radius:4px;
  margin-bottom:8px;
}
.hero-title{
  font-size:clamp(18px,4vw,32px);
  font-weight:800;
  text-shadow:0 2px 8px rgba(0,0,0,.8);
  max-width:80%;
}
.hero-dots{
  position:absolute;
  right:18px; bottom:18px;
  display:flex; gap:6px; z-index:3;
}
.hero-dot{
  width:8px;height:8px;border-radius:50%;
  background:rgba(255,255,255,.35);
  cursor:pointer;
  transition:.25s;
}
.hero-dot.active{background:var(--accent2);width:22px;border-radius:5px;}
.hero-nav{
  position:absolute;top:50%;transform:translateY(-50%);
  width:42px;height:42px;border-radius:50%;
  background:rgba(0,0,0,.4);
  border:1px solid rgba(255,255,255,.25);
  color:#fff;font-size:20px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:3;
  opacity:0;transition:.2s;
}
.hero:hover .hero-nav{opacity:1;}
.hero-nav.prev{left:14px;}
.hero-nav.next{right:14px;}

/* ===== TOP BAR ===== */
.topbar{
  display:flex;align-items:center;gap:14px;
  padding:12px 18px;
  background:var(--panel);
  border-bottom:1px solid #23262e;
  position:sticky;top:0;z-index:50;
}
.brand{font-weight:800;font-size:18px;letter-spacing:.03em;color:var(--accent2);white-space:nowrap;}
.search-box{
  flex:1;max-width:420px;
  display:flex;align-items:center;
  background:var(--panel2);
  border:1px solid #2a2e38;
  border-radius:8px;
  padding:8px 12px;
}
.search-box input{
  background:transparent;border:none;outline:none;
  color:var(--text);width:100%;font-size:14px;
}
.search-box input::placeholder{color:var(--muted);}
.menu-toggle{
  display:none;
  background:var(--panel2);
  border:1px solid #2a2e38;
  color:var(--text);
  border-radius:8px;
  padding:8px 12px;
  cursor:pointer;
}

/* ===== LAYOUT ===== */
.layout{
  display:flex;
  flex:1;
  min-height:0;
}
.sidebar{
  width:230px;
  flex-shrink:0;
  background:var(--panel);
  border-right:1px solid #23262e;
  overflow-y:auto;
  padding:14px 0;
  max-height:calc(100vh - 64px);
  position:sticky;
  top:64px;
}
.sidebar h3{
  font-size:11px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.08em;
  padding:6px 18px 10px;
}
.cat-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 18px;
  cursor:pointer;
  color:var(--muted);
  font-size:14.5px;
  border-left:3px solid transparent;
  transition:.15s;
}
.cat-item:hover, .cat-item.focused{
  background:var(--panel2);
  color:var(--text);
}
.cat-item.active{
  border-left-color:var(--accent);
  color:var(--accent2);
  background:var(--panel2);
  font-weight:600;
}
.cat-count{
  font-size:11.5px;
  background:#262a33;
  color:var(--muted);
  border-radius:10px;
  padding:1px 8px;
}

.main{
  flex:1;
  min-width:0;
  padding:20px;
  overflow-y:auto;
}
.section-title{
  font-size:16px;
  font-weight:700;
  margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.section-title .pill{
  width:5px;height:18px;background:var(--accent);border-radius:3px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:16px;
}
.card{
  background:var(--panel2);
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  border:2px solid transparent;
  transition:transform .15s, border-color .15s, box-shadow .15s;
  position:relative;
}
.card:hover, .card.focused{
  transform:translateY(-4px) scale(1.02);
  border-color:var(--accent2);
  box-shadow:0 8px 22px rgba(0,0,0,.5);
  z-index:2;
}
.card .thumb-wrap{
  width:100%;aspect-ratio:2/3;
  background:#000;
  overflow:hidden;
}
.card img{
  width:100%;height:100%;object-fit:cover;
  display:block;
}
.card .play-badge{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:42px;height:42px;border-radius:50%;
  background:rgba(0,0,0,.55);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:.2s;
  color:#fff;font-size:16px;
}
.card:hover .play-badge,.card.focused .play-badge{opacity:1;}
.card .title{
  padding:9px 10px 11px;
  font-size:13px;
  font-weight:600;
  line-height:1.3;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

.empty{
  color:var(--muted);
  padding:40px 0;
  text-align:center;
}

/* ===== PLAYER MODAL ===== */
.player-overlay{
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,.92);
  z-index:200;
  align-items:center;justify-content:center;
  flex-direction:column;
}
.player-overlay.open{display:flex;}
.player-box{
  width:100%;
  max-width:1100px;
  background:#000;
  position:relative;
}
.video-wrap{
  position:relative;
  width:100%;
  aspect-ratio:16/9;
  background:#000;
}
video{width:100%;height:100%;background:#000;}
.player-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;
  background:#0d0e12;
  width:100%;max-width:1100px;
}
.player-title{font-weight:700;font-size:15px;}
.close-btn{
  background:var(--panel2);
  border:1px solid #2a2e38;
  color:var(--text);
  border-radius:8px;
  padding:8px 14px;
  cursor:pointer;
  font-size:14px;
}
.close-btn:hover,.close-btn.focused{background:var(--accent);border-color:var(--accent);}
.loading{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:14px;
  background:rgba(0,0,0,.4);
}
.spinner{
  width:34px;height:34px;border-radius:50%;
  border:3px solid rgba(255,255,255,.2);
  border-top-color:var(--accent2);
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ===== TV / REMOTE focus ring ===== */
.tv-mode .card.focused, .tv-mode .cat-item.focused, .tv-mode .close-btn.focused, .tv-mode .hero-dot.focused{
  outline:3px solid var(--focus);
  outline-offset:2px;
}

/* ===== RESPONSIVE ===== */
@media (max-width:900px){
  .sidebar{
    position:fixed;
    left:-260px;
    top:0;bottom:0;
    height:100%;
    max-height:100%;
    z-index:80;
    transition:left .25s;
    box-shadow:4px 0 18px rgba(0,0,0,.5);
  }
  .sidebar.open{left:0;}
  .menu-toggle{display:block;}
  .overlay-dim{
    display:none;
    position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:70;
  }
  .overlay-dim.open{display:block;}
  .grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;}
  .hero{height:32vh;min-height:170px;}
  .hero-title{max-width:100%;}
}

/* Landscape phone */
@media (max-width:900px) and (orientation:landscape){
  .hero{height:60vh;}
}

/* Portrait small */
@media (max-width:480px){
  .brand{font-size:15px;}
  .search-box{max-width:140px;}
  .player-header{padding:8px 12px;}
}
</style>
</head>

<div class="topbar">

</div>

<div class="hero" id="hero">
  <div class="hero-track" id="heroTrack"></div>
  <div class="hero-nav prev" id="heroPrev">‹</div>
  <div class="hero-nav next" id="heroNext">›</div>
  <div class="hero-dots" id="heroDots"></div>

<div class="player-overlay" id="playerOverlay">

  </div>
  <div class="player-box">
    <div class="video-wrap">

      <div class="loading" id="loadingEl"><div class="spinner"></div></div>

<script type="module">
// ───────────────────────── DATA ─────────────────────────
const REFERRER = 'https://9.9nung.com/';
// ดึงข้อมูลจากไฟล์ข้อมูลหนัง/ซีรีย์หลายไฟล์ เข้ามารวมกันในตัวแปร items
import { movies } from './data/movies.js';
import { series } from './data/series.js';
import { netflixMovies } from './data/netflix.js';
import { anime } from './data/anime.js';
const items = [...movies, ...series, ...netflixMovies, ...anime];
  

// ───────────────────────── STATE ─────────────────────────
let currentGroup = 'ทั้งหมด';
let searchTerm = '';
let hls = null;
let heroIndex = 0;
let heroTimer = null;

const groups = ['ทั้งหมด', ...Array.from(new Set(items.map(i => i.group)))];

// ───────────────────────── HERO SLIDER (newest movies) ─────────────────────────
function buildHero(){
  // featured = newest category items (หนังใหม่2026 first, fallback to all) — จำกัดแค่ 7 เรื่อง
  let featured = items.filter(i => /2026|2025/.test(i.group)).slice(0, 10);
  if(featured.length === 0) featured = items.slice(0, 10);

  const track = document.getElementById('heroTrack');
  const dots = document.getElementById('heroDots');
  track.innerHTML = '';
  dots.innerHTML = '';

  featured.forEach((it, idx) => {
    const slide = document.createElement('div');
    slide.className = 'hero-slide';
    slide.style.backgroundImage = `url('${it.logo}')`;
    slide.tabIndex = 0;
    slide.addEventListener('click', () => openPlayer(it));
    slide.innerHTML = `<div class="hero-info">
        <span class="hero-tag">${it.group}</span>
        <div class="hero-title">${it.name}</div>
      </div>`;
    track.appendChild(slide);

    const dot = document.createElement('div');
    dot.className = 'hero-dot' + (idx === 0 ? ' active' : '');
    dot.addEventListener('click', () => goHero(idx));
    dots.appendChild(dot);
  });

  document.getElementById('heroPrev').onclick = () => goHero(heroIndex - 1);
  document.getElementById('heroNext').onclick = () => goHero(heroIndex + 1);

  goHero(0);
  resetHeroTimer();
}

function goHero(idx){
  const track = document.getElementById('heroTrack');
  const slides = track.children;
  if(slides.length === 0) return;
  heroIndex = (idx + slides.length) % slides.length;
  track.style.transform = `translateX(-${heroIndex * 100}%)`;
  document.querySelectorAll('.hero-dot').forEach((d, i) => d.classList.toggle('active', i === heroIndex));
  resetHeroTimer();
}

function resetHeroTimer(){
  if(heroTimer) clearInterval(heroTimer);
  heroTimer = setInterval(() => goHero(heroIndex + 1), 5000);
}

// ───────────────────────── SIDEBAR / CATEGORIES ─────────────────────────
function buildSidebar(){
  const list = document.getElementById('catList');
  list.innerHTML = '';
  groups.forEach(g => {
    const count = g === 'ทั้งหมด' ? items.length : items.filter(i => i.group === g).length;
    const el = document.createElement('div');
    el.className = 'cat-item' + (g === currentGroup ? ' active' : '');
    el.dataset.group = g;
    el.tabIndex = 0;
    el.innerHTML = `<span>${g}</span><span class="cat-count">${count}</span>`;
    el.addEventListener('click', () => selectGroup(g));
    list.appendChild(el);
  });
}

function selectGroup(g){
  currentGroup = g;
  document.getElementById('sectionLabel').textContent = g;
  document.querySelectorAll('.cat-item').forEach(el => el.classList.toggle('active', el.dataset.group === g));
  buildGrid();
  closeSidebarMobile();
}

// ───────────────────────── GRID ─────────────────────────
// ───────────────────────── GRID (infinite scroll) ─────────────────────────
const GRID_BATCH_SIZE = 40;
let currentFilteredList = [];
let renderedCount = 0;
let gridObserver = null;

function createCard(it){
  const card = document.createElement('div');
  card.className = 'card';
  card.tabIndex = 0;
  card.innerHTML = `
    <div class="thumb-wrap"><img src="${it.logo}" loading="lazy" alt="${it.name}"></div>
    <div class="play-badge">▶</div>
    <div class="title">${it.name}</div>
  `;
  card.addEventListener('click', () => openPlayer(it));
  card.addEventListener('keydown', e => {
    if(e.key === 'Enter') openPlayer(it);
  });
  return card;
}

function renderNextBatch(){
  const grid = document.getElementById('grid');
  const loadingEl = document.getElementById('gridLoading');
  const nextItems = currentFilteredList.slice(renderedCount, renderedCount + GRID_BATCH_SIZE);
  if(nextItems.length === 0){
    if(loadingEl) loadingEl.style.display = 'none';
    return;
  }
  const fragment = document.createDocumentFragment();
  nextItems.forEach(it => fragment.appendChild(createCard(it)));
  grid.appendChild(fragment);
  renderedCount += nextItems.length;
  refreshFocusables();

  if(loadingEl){
    loadingEl.style.display = renderedCount < currentFilteredList.length ? 'block' : 'none';
  }
}

function buildGrid(){
  const grid = document.getElementById('grid');
  const emptyMsg = document.getElementById('emptyMsg');
  const loadingEl = document.getElementById('gridLoading');
  grid.innerHTML = '';
  renderedCount = 0;

  let list = items;
  if(currentGroup !== 'ทั้งหมด') list = list.filter(i => i.group === currentGroup);
  if(searchTerm.trim()) {
    const q = searchTerm.trim().toLowerCase();
    list = list.filter(i => i.name.toLowerCase().includes(q));
  }
  currentFilteredList = list;

  if(list.length === 0){
    emptyMsg.style.display = 'block';
    if(loadingEl) loadingEl.style.display = 'none';
    return;
  }
  emptyMsg.style.display = 'none';

  renderNextBatch();

  // ตั้งค่า IntersectionObserver แค่ครั้งเดียว ให้คอยจับ sentinel เพื่อโหลดเพิ่มอัตโนมัติ
  if(!gridObserver){
    const sentinel = document.getElementById('gridSentinel');
    gridObserver = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if(entry.isIntersecting) renderNextBatch();
      });
    }, { rootMargin: '300px' });
    gridObserver.observe(sentinel);
  }
}

// ───────────────────────── SEARCH ─────────────────────────
document.getElementById('searchInput').addEventListener('input', e => {
  searchTerm = e.target.value;
  buildGrid();
});

// ───────────────────────── PLAYER (HLS.js with JW-style controls fallback) ─────────────────────────
const video = document.getElementById('video');
const playerOverlay = document.getElementById('playerOverlay');
const loadingEl = document.getElementById('loadingEl');

function openPlayer(item){
  document.getElementById('playerTitle').textContent = item.name;
  playerOverlay.classList.add('open');
  loadingEl.style.display = 'flex';
  document.body.style.overflow = 'hidden';

  destroyHls();

  const url = item.url;

  if (Hls.isSupported()) {
    hls = new Hls({
      xhrSetup: function(xhr){
        // referrer hint via custom header where supported by CDN proxies
        try { xhr.setRequestHeader('Referer', REFERRER); } catch(e){}
      },
      maxBufferLength: 30
    });
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      loadingEl.style.display = 'none';
      video.play().catch(()=>{});
    });
    hls.on(Hls.Events.ERROR, (event, data) => {
      if (data.fatal) {
        loadingEl.innerHTML = '<div style="color:#ff6b6b;font-size:14px;">โหลดวิดีโอไม่สำเร็จ ลองใหม่อีกครั้ง</div>';
      }
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    // Native HLS (Safari / some Android TV browsers)
    video.src = url;
    video.addEventListener('loadedmetadata', () => {
      loadingEl.style.display = 'none';
      video.play().catch(()=>{});
    }, { once:true });
  } else {
    loadingEl.innerHTML = '<div style="color:#ff6b6b;font-size:14px;">เบราว์เซอร์นี้ไม่รองรับ HLS</div>';
  }

  setFocus(document.getElementById('closeBtn'));
}

function destroyHls(){
  if (hls) { hls.destroy(); hls = null; }
  video.removeAttribute('src');
  video.load();
}

function closePlayer(){
  destroyHls();
  playerOverlay.classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('closeBtn').addEventListener('click', closePlayer);
playerOverlay.addEventListener('click', e => { if(e.target === playerOverlay) closePlayer(); });

// ───────────────────────── MOBILE SIDEBAR TOGGLE ─────────────────────────
const sidebar = document.getElementById('sidebar');
const overlayDim = document.getElementById('overlayDim');
document.getElementById('menuToggle').addEventListener('click', () => {
  sidebar.classList.toggle('open');
  overlayDim.classList.toggle('open');
});
overlayDim.addEventListener('click', closeSidebarMobile);
function closeSidebarMobile(){
  sidebar.classList.remove('open');
  overlayDim.classList.remove('open');
}

// ───────────────────────── TV / REMOTE NAVIGATION (D-Pad) ─────────────────────────
// Detect remote/keyboard usage to show focus ring (Android TV boxes send keydown arrow events)
let focusables = [];
let focusIndex = 0;

function isTVLikely(){
  return /Android|GoogleTV|AFT|BRAVIA|Tizen|Web0S|SMART-TV/i.test(navigator.userAgent);
}

function refreshFocusables(){
  if (playerOverlay.classList.contains('open')) {
    focusables = [document.getElementById('closeBtn')];
    return;
  }
  const cats = Array.from(document.querySelectorAll('.cat-item'));
  const cards = Array.from(document.querySelectorAll('.card'));
  const dots = Array.from(document.querySelectorAll('.hero-dot'));
  focusables = [...dots, ...cats, ...cards];
}

function setFocus(el){
  document.querySelectorAll('.focused').forEach(e => e.classList.remove('focused'));
  if(!el) return;
  el.classList.add('focused');
  el.scrollIntoView({block:'nearest', behavior:'smooth'});
  focusIndex = focusables.indexOf(el);
}

function moveFocus(dir){
  refreshFocusables();
  if (focusables.length === 0) return;
  if (focusIndex < 0 || focusIndex >= focusables.length) focusIndex = 0;

  const cols = getGridColumns();
  let next = focusIndex;

  if (dir === 'right') next = Math.min(focusIndex + 1, focusables.length - 1);
  else if (dir === 'left') next = Math.max(focusIndex - 1, 0);
  else if (dir === 'down') next = Math.min(focusIndex + cols, focusables.length - 1);
  else if (dir === 'up') next = Math.max(focusIndex - cols, 0);

  setFocus(focusables[next]);
}

function getGridColumns(){
  const grid = document.getElementById('grid');
  const style = window.getComputedStyle(grid);
  const cols = style.gridTemplateColumns.split(' ').length;
  return cols || 1;
}

document.addEventListener('keydown', e => {
  document.body.classList.add('tv-mode');

  if (playerOverlay.classList.contains('open')) {
    if (e.key === 'Escape' || e.key === 'Backspace') { closePlayer(); }
    return;
  }

  switch(e.key){
    case 'ArrowRight': e.preventDefault(); moveFocus('right'); break;
    case 'ArrowLeft':  e.preventDefault(); moveFocus('left'); break;
    case 'ArrowDown':  e.preventDefault(); moveFocus('down'); break;
    case 'ArrowUp':    e.preventDefault(); moveFocus('up'); break;
    case 'Enter':
    case ' ':
      e.preventDefault();
      const focused = document.querySelector('.focused');
      if (focused) focused.click();
      break;
    case 'Backspace':
    case 'Escape':
      closeSidebarMobile();
      break;
  }
});

// Mouse use disables tv-mode visual ring
document.addEventListener('mousemove', () => document.body.classList.remove('tv-mode'), {passive:true});

// ───────────────────────── INIT ─────────────────────────
function init(){
  buildHero();
  buildSidebar();
  buildGrid();
  refreshFocusables();
  if (isTVLikely()) document.body.classList.add('tv-mode');
}
init();
</script>
